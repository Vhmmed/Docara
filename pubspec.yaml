name: medical_booking_app
description: AI-powered medical booking platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # DI
  get_it: ^9.2.1

  # Network
  dio: ^5.3.3

  # Local Storage
  flutter_secure_storage: ^10.0.0

  # Navigation
  go_router: ^17.2.0

  # Firebase
  firebase_core: ^3.12.0
  firebase_messaging: ^15.2.0
  supabase_flutter: ^2.6.0

  # Local Notifications
  flutter_local_notifications: ^18.0.0

  # OAuth
  flutter_web_auth_2: ^5.0.0
  url_launcher: ^6.3.0

  # Utils
  dartz: ^0.10.1
  intl: ^0.20.2
  image_picker: ^1.0.4
  file_picker: ^11.0.2
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.2.1
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  retrofit_generator: ^10.2.4
  mockito: ^5.4.3
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/LogoApp/
    - .env
  fonts:
    - family: IBM Plex Sans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Variable.ttf

    - family: IBM Plex Sans Arabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
        - asset: assets/fonts/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
